    <div class="form-personagem">

    <h2>Sobre você e o Groot</h2>

    <form id="formPersonagem">

        <label>Seu nome:</label>
        <input type="text" id="nomePergunta" placeholder="Digite seu nome">

        <label>Você gosta do Groot?</label>
        <select id="gosta">
            <option value="">Selecione</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <label>Qual sua versão favorita?</label>
        <select id="versao">
            <option value="">Selecione</option>
            <option>Baby Groot</option>
            <option>Groot adolescente</option>
            <option>Groot adulto</option>
        </select>

        <label>Qual sua cena favorita?</label>
        <textarea id="cena" placeholder="Descreva a cena"></textarea>

        <button type="submit">Enviar</button>

        <p id="mensagem"></p>

    </form>
<div id="listaRespostas">
</div>
</div>
    <img id="fixed" src="assets/image/grootfixed.png" alt="groot">
